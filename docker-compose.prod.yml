services:
  postgres:
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: api
    restart: unless-stopped
    ports:
      - '${PORT:-3333}:3333'
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-nest_api}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
