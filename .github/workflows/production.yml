name: Production

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: production

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Cache pnpm store
        uses: actions/cache@v4.2.3
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          APP_NAME: app-name
          APP_VERSION: 0.0.1
          HOST: 0.0.0.0
          PORT: 3333
          GLOBAL_PREFIX: api
          CORS_ORIGINS: ""
          SENTRY_DSN: https://0@sentry.io/0
          SENTRY_ENVIRONMENT: test
          SENTRY_TRACES_SAMPLE_RATE: "0.1"
          SENTRY_ENABLED: "false"
          OPENAPI_APP_NAME: app api
          OPENAPI_APP_DESCRIPTION: project api
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?schema=public
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          LOG_PRISMA: "false"
          BETTER_AUTH_URL: http://localhost:3333
          BETTER_AUTH_SECRET: better_auth_secret_placeholder
          RESEND_API_KEY: re_test_placeholder
          RESEND_FROM_EMAIL: noreply@test.com
          STRIPE_SECRET_KEY: "sk_test_..."
          STRIPE_WEBHOOK_SECRET: "whsec_..."
          STRIPE_PUBLISHABLE_KEY: "pk_test_..."
          STRIPE_SUCCESS_URL: "http://localhost:5173/payment-success?session_id:{CHECKOUT_SESSION_ID}"
          STRIPE_CANCEL_URL: "http://localhost:5173/pay"

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=production
            type=sha,prefix=production-

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
